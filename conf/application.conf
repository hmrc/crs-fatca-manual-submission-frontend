include "frontend.conf"

appName="crs-fatca-manual-submission-frontend"

play.http.router = prod.Routes

play.http.errorHandler = "handlers.ErrorHandler"

play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuthModule"
play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"
play.modules.enabled += "config.Module"

play.filters.enabled += play.filters.csp.CSPFilter

play.i18n.langs = ["en"]

microservice {
    services {
        auth {
        protocol = http
        host     = localhost
        port     = 8500
        }

        feedback-frontend {
        protocol = http
        host     = localhost
        port     = 9514
        }

        crs-fatca-manual-submission {
        protocol = http
        host     = localhost
        port     = 10040
        }

        crs-fatca-reporting {
          protocol = http
          host     = localhost
          port     = 10037
        }


        crs-fatca-fi-management {
          protocol = http
          host = localhost
          port = 10034
        }
        
        crs-fatca-registration {
           host = localhost
           port = 10031
           protocol = http
           base-path = "/crs-fatca-registration"
        }
    }
}

contact-frontend {
  host      = "http://localhost:9250"
  serviceId = "crs-fatca-manual-submission-frontend"
}

timeout-dialog {
  timeout   = 900
  countdown = 120
}

session {
  timeoutSeconds = 900
}

mongodb {
  uri                 = "mongodb://localhost:27017/"${appName}
  timeToLiveInSeconds = 900
}

enquiry {
  email = "aeoi.enquiries@hmrc.gov.uk"
}

urls {
  login         = "http://localhost:9949/auth-login-stub/gg-sign-in"
  loginContinue = "http://localhost:9000/crs-fatca-manual-submission-frontend"
  signOut       = "http://localhost:9553/bas-gateway/sign-out-without-state"
  manageFI      = "http://localhost:10033/manage-your-crs-and-fatca-financial-institutions"
  yourFIs       = "http://localhost:10033/manage-your-crs-and-fatca-financial-institutions/your-fis"
  register      = "http://localhost:10030/register-for-crs-and-fatca"
  fileUpload    = "http://localhost:10038/report-for-crs-and-fatca/report/upload-file"
}

keys {
    enrolmentKey.crsFatca = "HMRC-FATCA-ORG"
    enrolmentKey.ct       = "IR-CT"
}

host = "http://localhost:9000"

accessibility-statement{
  service-path = "/crs-fatca-manual-submission-frontend"
}

tracking-consent-frontend {
  gtm.container = "transitional"
}

play-frontend-hmrc {
    useRebrand = true
}

features {
}
